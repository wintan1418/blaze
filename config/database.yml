default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  <% if ENV["DB_HOST"].present? %>
  host: <%= ENV["DB_HOST"] %>
  username: <%= ENV.fetch("DB_USERNAME") { ENV["USER"] } %>
  password: <%= ENV["DB_PASSWORD"] %>
  <% end %>

development:
  <<: *default
  database: blaze_cafe_development

test:
  <<: *default
  database: blaze_cafe_test

production:
  primary: &primary_production
    <<: *default
    database: blaze_cafe_production
    username: blaze_cafe
    password: <%= ENV["BLAZE_CAFE_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: blaze_cafe_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: blaze_cafe_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: blaze_cafe_production_cable
    migrations_paths: db/cable_migrate
